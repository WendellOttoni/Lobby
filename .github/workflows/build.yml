name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: desktop/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $version = "0.1.${{ github.run_number }}"
          $file = "desktop/src-tauri/tauri.conf.json"
          $content = Get-Content $file -Raw
          $content = $content -replace '"version":\s*"[^"]*"', """version"": ""$version"""
          Set-Content $file $content -Encoding utf8
          Write-Host "Version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          projectPath: desktop
          tagName: v${{ steps.version.outputs.version }}
          releaseName: "Lobby v${{ steps.version.outputs.version }}"
          releaseBody: |
            Build automática gerada a partir do branch `main`.
            Commit: `${{ github.sha }}`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Prune old releases (keep last 10)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releases = gh release list --limit 100 --json tagName,createdAt | ConvertFrom-Json
          $toDelete = $releases | Sort-Object createdAt -Descending | Select-Object -Skip 10
          foreach ($r in $toDelete) {
            Write-Host "Deleting old release: $($r.tagName)"
            gh release delete $r.tagName --yes --cleanup-tag
          }
