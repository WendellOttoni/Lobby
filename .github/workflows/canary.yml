name: Canary Build

on:
  push:
    branches:
      - main

jobs:
  canary:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: desktop/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop

      - name: Set canary version
        shell: pwsh
        run: |
          $version = "0.0.${{ github.run_number }}"
          $file = "desktop/src-tauri/tauri.conf.json"
          $content = Get-Content $file -Raw
          $content = $content -replace '"version":\s*"[^"]*"', """version"": ""$version"""
          Set-Content $file $content -Encoding utf8
          Write-Host "Canary version: $version"

      - name: Delete existing canary release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete canary --yes 2>$null
          git push --delete origin canary 2>$null
          exit 0

      - name: Build and publish canary
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          projectPath: desktop
          tagName: canary
          releaseName: "Lobby — última build"
          releaseBody: |
            ⚠️ Build automática gerada a partir do branch `main`.
            Commit: `${{ github.sha }}`
            Não afeta o auto-updater dos usuários finais.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false
